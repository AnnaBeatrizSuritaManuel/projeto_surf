<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Surf Para Todos</title>
    <link rel="stylesheet" href="../css/cadastro.css">
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html"><img src="../img/logo.png" alt="Surf Para Todos"></a>
        </div>
        <nav>
            <a href="aula.html">Aulas</a>
            <a href="lfisica.html">Equipamento(Loja)</a>
            <a href="equipamentod.html">Equipamentos</a>
            <a href="clima.html">Clima</a>
        </nav>
        <div class="icons">
            <a href="carrinho.html">🛒</a>
            <a href="cadastro.html">👤</a>
        </div>
    </header>

    <main class="login-container">
        <div class="login-box">
            <div class="user-icon">👤</div>
            <h2>Ficha de Cadastro</h2>
            
            <form id="loginForm">
                <div class="input-group">
                    <span>👤</span>
                    <input type="text" id="nome" placeholder="Nome Completo" required>
                </div>

                <div class="input-group">
                    <span>✉️</span>
                    <input type="email" id="email" placeholder="E-mail" required>
                </div>

                <div class="input-group">
                    <span>📞</span>
                    <input type="tel" id="telefone" placeholder="Telefone / WhatsApp" required>
                </div>

                <div class="select-group">
                    <label for="nivel">Nível de experiência:</label>
                    <select id="nivel" required>
                        <option value="" disabled selected>Selecione seu nível</option>
                        <option value="nunca">Nunca pratiquei surf antes (Iniciante)</option>
                        <option value="basico">Consigo ficar de pé na prancha (Intermediário)</option>
                        <option value="avancado">Já pego ondas com autonomia (Avançado)</option>
                    </select>
                </div>

                <div class="textarea-group">
                    <label for="expectativa">O que espera aprender nas aulas?</label>
                    <textarea id="expectativa" rows="3" placeholder="Ex: Aprender o básico, evoluir nas manobras..." required></textarea>
                </div>

                <div class="textarea-group">
                    <label for="observacoes">Observações:</label>
                    <textarea id="observacoes" rows="2" placeholder="Ex: Alguma condição médica, restrição ou detalhe importante..."></textarea>
                </div>

                <button type="submit" class="btn-login">Cadastrar e Entrar</button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            alert('Cadastro realizado com sucesso!');
            
            // Redireciona para a página do usuário
            window.location.href = 'usuario.html';
        });
    </script>
</body>
</html>
